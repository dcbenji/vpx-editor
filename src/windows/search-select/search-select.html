<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Search/Select Element</title>
  <script>
    var theme = new URLSearchParams(window.location.search).get('theme');
    if (theme) document.documentElement.setAttribute('data-theme', theme);
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    :root {
      --bg-dark: #1e1e1e;
      --bg-panel: #252526;
      --bg-toolbar: #333333;
      --border-color: #3c3c3c;
      --text-primary: #cccccc;
      --text-secondary: #888888;
      --accent: #0078d4;
      --accent-hover: #1084d8;
    }

    [data-theme="light"] {
      --bg-dark: #f3f3f3;
      --bg-panel: #ffffff;
      --bg-toolbar: #e8e8e8;
      --border-color: #d4d4d4;
      --text-primary: #333333;
      --text-secondary: #666666;
      --accent: #0078d4;
      --accent-hover: #106ebe;
    }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    ::-webkit-scrollbar-corner { background: var(--bg-dark); }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg-dark);
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border-color);
    }

    .toolbar-filter {
      padding: 6px 10px;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 12px;
      width: 250px;
    }

    .toolbar-filter:focus {
      outline: none;
      border-color: var(--accent);
    }

    .toolbar-filter::placeholder {
      color: var(--text-secondary);
    }

    .toolbar-spacer {
      flex: 1;
    }

    .toolbar-btn {
      padding: 6px 12px;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 12px;
    }

    .toolbar-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .toolbar-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .toolbar-btn.primary:hover {
      background: var(--accent-hover);
    }

    #content {
      flex: 1;
      overflow: hidden;
    }

    #table-container {
      height: 100%;
      overflow: auto;
    }

    #element-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      table-layout: fixed;
    }

    #element-table thead {
      position: sticky;
      top: 0;
      background: var(--bg-toolbar);
      z-index: 1;
    }

    #element-table th {
      padding: 6px 8px;
      text-align: left;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border-color);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
      cursor: pointer;
      position: relative;
    }

    #element-table th:hover {
      color: var(--text-primary);
      background: var(--bg-dark);
    }

    .resize-handle {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 5px;
      cursor: col-resize;
      background: transparent;
    }

    .resize-handle:hover,
    .resize-handle.resizing {
      background: var(--accent);
    }

    #element-table th.sort-asc::after {
      content: ' ▲';
      font-size: 8px;
    }

    #element-table th.sort-desc::after {
      content: ' ▼';
      font-size: 8px;
    }

    #element-table td {
      padding: 4px 8px;
      border-bottom: 1px solid var(--border-color);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #element-table tbody tr {
      cursor: pointer;
    }

    #element-table tbody tr:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    #element-table tbody tr.selected {
      background: var(--accent);
      color: white;
    }

    #status-bar {
      padding: 4px 12px;
      background: var(--bg-toolbar);
      border-top: 1px solid var(--border-color);
      font-size: 11px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <input type="text" id="filter" class="toolbar-filter" placeholder="Filter...">
      <div class="toolbar-spacer"></div>
      <button id="btn-select" class="toolbar-btn primary">Select</button>
    </div>

    <div id="content">
      <div id="table-container">
        <table id="element-table">
          <thead>
            <tr>
              <th data-col="0" style="width: 200px;">Name</th>
              <th data-col="1" style="width: 70px;">Type</th>
              <th data-col="2" style="width: 100px;">Layer</th>
              <th data-col="3" style="width: 200px;">Image</th>
              <th data-col="4" style="width: 200px;">Material</th>
              <th data-col="5" style="width: 200px;">Physics Material</th>
              <th data-col="6" style="width: 100px;">Collection</th>
              <th data-col="7" style="width: 70px;">Collidable</th>
              <th data-col="8" style="width: 70px;">Visible</th>
              <th data-col="9" style="width: 70px;">Timer enabled</th>
              <th data-col="10" style="width: 70px;">Depth Bias</th>
              <th data-col="11" style="width: 70px;">Static rendering</th>
              <th data-col="12" style="width: 70px;">Reflections enabled</th>
              <th data-col="13" style="width: 200px;">Surface</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <div id="status-bar">Ready</div>
  </div>

  <script>
    let items = {};
    let collections = [];
    let extractedDir = null;
    let sortColumn = 0;
    let sortAscending = true;
    let tableData = [];
    let filteredData = [];
    let lastClickedIndex = -1;
    let shiftAnchorIndex = -1;

    const COLUMNS = [
      { key: 'name' },
      { key: 'type' },
      { key: 'layer' },
      { key: 'image' },
      { key: 'material' },
      { key: 'physicsMaterial' },
      { key: 'collection' },
      { key: 'collidable' },
      { key: 'visible' },
      { key: 'timerEnabled' },
      { key: 'depthBias' },
      { key: 'staticRendering' },
      { key: 'reflections' },
      { key: 'surface' }
    ];

    if (window.searchSelect) {
      window.searchSelect.onInit((data) => {
        extractedDir = data.extractedDir;
        items = data.items || {};
        collections = data.collections || [];
        if (data.theme) document.documentElement.setAttribute('data-theme', data.theme);
        buildTableData();
        renderTable();
        setStatus(`Loaded ${Object.keys(items).length} elements`);
      });

      window.searchSelect.onThemeChanged((theme) => {
        document.documentElement.setAttribute('data-theme', theme);
      });

      window.searchSelect.onUpdate((data) => {
        items = data.items || {};
        collections = data.collections || [];
        buildTableData();
        renderTable();
      });

      window.searchSelect.onSetDisabled((disabled) => {
        if (disabled) {
          extractedDir = null;
          items = {};
          collections = [];
          tableData = [];
          filteredData = [];
          document.getElementById('table-body').innerHTML = '';
          document.getElementById('filter').value = '';
          document.getElementById('filter').disabled = true;
          setStatus('No table loaded');
        } else {
          document.getElementById('filter').disabled = false;
        }
      });
    } else {
      document.getElementById('status-bar').textContent = 'Error: Preload failed';
    }

    function getCollectionForItem(itemName) {
      for (const col of collections) {
        if (col.items && col.items.includes(itemName)) {
          return col.name;
        }
      }
      return '';
    }

    function isValidString(str) {
      return str && str.trim().length > 0;
    }

    function joinWithSeparator(...values) {
      return values.filter(v => isValidString(v)).join('--');
    }

    function getLayerPath(name, item) {
      if (item._type === 'PartGroup') {
        return name;
      }
      const parent = item.part_group_name || item._layerName;
      if (parent && parent.trim()) {
        return parent + '/' + name;
      }
      return '';
    }

    function getItemData(name, item) {
      const rawType = item._type;
      const layer = getLayerPath(name, item);

      let type = rawType;
      let image = '';
      let material = '';
      let physicsMaterial = '';
      let collidable = '';
      let visible = '';
      let timerEnabled = '';
      let depthBias = '';
      let staticRendering = '';
      let reflections = '';
      let surface = '';

      switch (rawType) {
        case 'Wall':
        case 'Surface':
          type = 'Wall';
          image = joinWithSeparator(item.image, item.side_image);
          material = joinWithSeparator(item.top_material, item.side_material, item.slingshot_material);
          physicsMaterial = isValidString(item.physics_material) ? item.physics_material : '';
          collidable = item.is_collidable ? 'X' : ' ';
          visible = item.is_side_visible ? (item.is_top_bottom_visible ? 'X' : 'S') : (item.is_top_bottom_visible ? 'T' : ' ');
          timerEnabled = item.is_timer_enabled ? 'X' : ' ';
          depthBias = 'N/A';
          staticRendering = item.is_static_rendering ? 'X' : ' ';
          reflections = 'N/A';
          surface = 'N/A';
          break;

        case 'Ramp':
          image = isValidString(item.image) ? item.image : '';
          material = isValidString(item.material) ? item.material : '';
          physicsMaterial = isValidString(item.physics_material) ? item.physics_material : '';
          collidable = item.is_collidable ? 'X' : ' ';
          visible = item.is_visible ? 'X' : ' ';
          timerEnabled = item.is_timer_enabled ? 'X' : ' ';
          depthBias = (item.depth_bias ?? 0).toFixed(1);
          staticRendering = item.is_static_rendering !== false ? 'X' : ' ';
          reflections = item.is_reflection_enabled ? 'X' : ' ';
          surface = 'N/A';
          break;

        case 'Flasher':
          image = joinWithSeparator(item.image_a, item.image_b);
          material = '';
          collidable = 'N/A';
          visible = item.is_visible ? 'X' : ' ';
          timerEnabled = item.is_timer_enabled ? 'X' : ' ';
          depthBias = (item.depth_bias ?? 0).toFixed(1);
          staticRendering = 'N/A';
          reflections = 'N/A';
          surface = 'N/A';
          break;

        case 'Rubber':
          image = isValidString(item.image) ? item.image : '';
          material = isValidString(item.material) ? item.material : '';
          physicsMaterial = isValidString(item.physics_material) ? item.physics_material : '';
          collidable = item.is_collidable ? 'X' : ' ';
          visible = item.is_visible ? 'X' : ' ';
          timerEnabled = item.is_timer_enabled ? 'X' : ' ';
          depthBias = 'N/A';
          staticRendering = item.is_static_rendering ? 'X' : ' ';
          reflections = item.is_reflection_enabled ? 'X' : ' ';
          surface = 'N/A';
          break;

        case 'Spinner':
          image = isValidString(item.image) ? item.image : '';
          material = isValidString(item.material) ? item.material : '';
          physicsMaterial = isValidString(item.physics_material) ? item.physics_material : '';
          collidable = item.is_collidable ? 'X' : ' ';
          visible = item.is_visible ? (item.show_bracket ? 'X' : 'S') : (item.show_bracket ? 'B' : ' ');
          timerEnabled = item.is_timer_enabled ? 'X' : ' ';
          depthBias = 'N/A';
          staticRendering = 'N/A';
          reflections = item.is_reflection_enabled ? 'X' : ' ';
          surface = item.surface || '';
          break;

        case 'Kicker':
          image = '';
          material = isValidString(item.material) ? item.material : '';
          physicsMaterial = isValidString(item.physics_material) ? item.physics_material : '';
          collidable = item.is_collidable ? 'X' : ' ';
          visible = item.kicker_type !== 'invisible' ? 'X' : ' ';
          timerEnabled = item.is_timer_enabled ? 'X' : ' ';
          depthBias = 'N/A';
          staticRendering = 'N/A';
          reflections = item.is_reflection_enabled ? 'X' : ' ';
          surface = item.surface || '';
          break;

        case 'Light':
          image = isValidString(item.image) ? item.image : '';
          material = '';
          collidable = item.is_collidable ? 'X' : ' ';
          visible = item.visible ? 'X' : ' ';
          timerEnabled = item.is_timer_enabled ? 'X' : ' ';
          depthBias = (item.depth_bias ?? 0).toFixed(1);
          staticRendering = 'N/A';
          reflections = item.is_reflection_enabled ? 'X' : ' ';
          surface = item.surface || '';
          break;

        case 'Bumper':
          image = '';
          material = joinWithSeparator(item.base_material, item.cap_material, item.skirt_material, item.ring_material);
          physicsMaterial = isValidString(item.physics_material) ? item.physics_material : '';
          collidable = item.is_collidable ? 'X' : ' ';
          const fullyVisible = item.is_cap_visible && item.is_base_visible && item.is_ring_visible && item.is_skirt_visible;
          const partlyVisible = item.is_cap_visible || item.is_base_visible || item.is_ring_visible || item.is_skirt_visible;
          visible = fullyVisible ? 'X' : (partlyVisible ? '/' : ' ');
          timerEnabled = item.is_timer_enabled ? 'X' : ' ';
          depthBias = 'N/A';
          staticRendering = 'N/A';
          reflections = item.is_reflection_enabled ? 'X' : ' ';
          surface = item.surface || '';
          break;

        case 'Flipper':
          image = isValidString(item.image) ? item.image : '';
          material = joinWithSeparator(item.material, item.rubber_material);
          physicsMaterial = isValidString(item.physics_material) ? item.physics_material : '';
          collidable = item.is_collidable ? 'X' : ' ';
          visible = item.is_visible ? 'X' : ' ';
          timerEnabled = item.is_timer_enabled ? 'X' : ' ';
          depthBias = 'N/A';
          staticRendering = 'N/A';
          reflections = item.is_reflection_enabled ? 'X' : ' ';
          surface = item.surface || '';
          break;

        case 'Gate':
          image = '';
          material = isValidString(item.material) ? item.material : '';
          physicsMaterial = isValidString(item.physics_material) ? item.physics_material : '';
          collidable = item.is_collidable ? 'X' : ' ';
          visible = item.is_visible ? (item.show_bracket ? 'X' : 'W') : (item.show_bracket ? 'B' : ' ');
          timerEnabled = item.is_timer_enabled ? 'X' : ' ';
          depthBias = 'N/A';
          staticRendering = 'N/A';
          reflections = item.is_reflection_enabled ? 'X' : ' ';
          surface = item.surface || '';
          break;

        case 'Trigger':
          image = '';
          material = isValidString(item.material) ? item.material : '';
          physicsMaterial = isValidString(item.physics_material) ? item.physics_material : '';
          collidable = item.is_collidable ? 'X' : ' ';
          visible = item.is_visible && item.shape !== 'none' ? 'X' : ' ';
          timerEnabled = item.is_timer_enabled ? 'X' : ' ';
          depthBias = 'N/A';
          staticRendering = 'N/A';
          reflections = item.is_reflection_enabled ? 'X' : ' ';
          surface = item.surface || '';
          break;

        case 'Timer':
          image = '';
          material = '';
          break;

        case 'TextBox':
          image = '';
          material = '';
          break;

        case 'Plunger':
          image = isValidString(item.image) ? item.image : '';
          material = isValidString(item.material) ? item.material : '';
          physicsMaterial = isValidString(item.physics_material) ? item.physics_material : '';
          collidable = item.is_collidable ? 'X' : ' ';
          visible = item.is_visible ? 'X' : ' ';
          timerEnabled = item.is_timer_enabled ? 'X' : ' ';
          depthBias = 'N/A';
          staticRendering = 'N/A';
          reflections = item.is_reflection_enabled ? 'X' : ' ';
          surface = item.surface || '';
          break;

        case 'Reel':
          type = 'EMReel';
          image = isValidString(item.image) ? item.image : '';
          material = '';
          break;

        case 'Primitive':
          image = isValidString(item.image) ? item.image : '';
          material = isValidString(item.material) ? item.material : '';
          physicsMaterial = isValidString(item.physics_material) ? item.physics_material : '';
          collidable = (item.is_collidable && !item.is_toy) ? 'X' : ' ';
          visible = item.is_visible ? 'X' : ' ';
          timerEnabled = item.is_timer_enabled ? 'X' : ' ';
          depthBias = (item.depth_bias ?? 0).toFixed(1);
          staticRendering = item.is_static_rendering ? 'X' : ' ';
          reflections = item.is_reflection_enabled ? 'X' : ' ';
          surface = 'N/A';
          break;

        case 'HitTarget':
          type = 'Target';
          image = isValidString(item.image) ? item.image : '';
          material = isValidString(item.material) ? item.material : '';
          physicsMaterial = isValidString(item.physics_material) ? item.physics_material : '';
          collidable = item.is_collidable ? 'X' : ' ';
          visible = item.is_visible ? 'X' : ' ';
          timerEnabled = item.is_timer_enabled ? 'X' : ' ';
          depthBias = (item.depth_bias ?? 0).toFixed(1);
          staticRendering = 'N/A';
          reflections = item.is_reflection_enabled ? 'X' : ' ';
          surface = 'N/A';
          break;

        case 'Decal':
          image = isValidString(item.image) ? item.image : '';
          material = isValidString(item.material) ? item.material : '';
          physicsMaterial = isValidString(item.physics_material) ? item.physics_material : '';
          surface = item.surface || '';
          break;

        case 'LightSequencer':
          type = 'LightSeq';
          image = '';
          material = '';
          break;

        case 'PartGroup':
          image = '';
          material = '';
          break;

        case 'Ball':
          break;
      }

      const typesWithCollectionNA = ['Wall', 'Surface', 'Ramp', 'Flasher', 'Rubber', 'Spinner',
        'Kicker', 'Light', 'Bumper', 'Flipper', 'Gate', 'Trigger', 'Plunger', 'Primitive', 'HitTarget'];
      const collection = typesWithCollectionNA.includes(rawType) ? 'N/A' : '';

      return {
        name,
        type,
        layer,
        image,
        material,
        physicsMaterial,
        collection,
        collidable,
        visible,
        timerEnabled,
        depthBias,
        staticRendering,
        reflections,
        surface,
        isCollection: false
      };
    }

    function buildTableData() {
      tableData = [];

      for (const collection of collections) {
        tableData.push({
          name: collection.name,
          type: 'Collection',
          layer: '',
          image: '',
          material: '',
          physicsMaterial: '',
          collection: '',
          collidable: '',
          visible: '',
          timerEnabled: '',
          depthBias: '',
          staticRendering: '',
          reflections: '',
          surface: '',
          isCollection: true
        });
      }

      for (const [name, item] of Object.entries(items)) {
        if (!name || !name.trim()) continue;
        tableData.push(getItemData(name, item));
      }

      sortData();
    }

    function sortData() {
      const key = COLUMNS[sortColumn].key;
      filteredData.sort((a, b) => {
        let valA = a[key] ?? '';
        let valB = b[key] ?? '';
        if (typeof valA === 'string') valA = valA.toLowerCase();
        if (typeof valB === 'string') valB = valB.toLowerCase();
        if (valA < valB) return sortAscending ? -1 : 1;
        if (valA > valB) return sortAscending ? 1 : -1;
        return 0;
      });
    }

    function applyFilter(filter) {
      const filterLower = filter.toLowerCase();
      if (!filterLower) {
        filteredData = [...tableData];
      } else {
        filteredData = tableData.filter(row =>
          row.name.toLowerCase().includes(filterLower) ||
          row.type.toLowerCase().includes(filterLower) ||
          row.layer.toLowerCase().includes(filterLower) ||
          row.collection.toLowerCase().includes(filterLower)
        );
      }
      sortData();
    }

    function renderTable() {
      const filter = document.getElementById('filter').value;
      applyFilter(filter);

      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';
      lastClickedIndex = -1;
      shiftAnchorIndex = -1;

      for (const row of filteredData) {
        const tr = document.createElement('tr');
        tr.dataset.name = row.name;
        tr.dataset.isCollection = row.isCollection;

        for (const col of COLUMNS) {
          const td = document.createElement('td');
          td.textContent = row[col.key] ?? '';
          td.title = row[col.key] ?? '';
          tr.appendChild(td);
        }

        tr.addEventListener('click', (e) => {
          const rows = Array.from(tbody.querySelectorAll('tr'));
          const currentIndex = rows.indexOf(tr);

          if (e.shiftKey && shiftAnchorIndex >= 0) {
            const start = Math.min(shiftAnchorIndex, currentIndex);
            const end = Math.max(shiftAnchorIndex, currentIndex);
            if (!e.ctrlKey && !e.metaKey) {
              rows.forEach(r => r.classList.remove('selected'));
            }
            for (let i = start; i <= end; i++) {
              rows[i].classList.add('selected');
            }
          } else if (e.ctrlKey || e.metaKey) {
            tr.classList.toggle('selected');
            shiftAnchorIndex = currentIndex;
          } else {
            rows.forEach(r => r.classList.remove('selected'));
            tr.classList.add('selected');
            shiftAnchorIndex = currentIndex;
          }

          lastClickedIndex = currentIndex;
          updateStatus();
        });

        tr.addEventListener('dblclick', () => {
          selectElements();
        });

        tbody.appendChild(tr);
      }

      updateSortIndicators();
      updateStatus();
    }

    function updateStatus() {
      const selectedCount = document.querySelectorAll('#table-body tr.selected').length;
      const totalCount = filteredData.length;
      if (selectedCount > 0) {
        setStatus(`${selectedCount} of ${totalCount} elements selected`);
      } else {
        setStatus(`${totalCount} elements`);
      }
    }

    function updateSortIndicators() {
      document.querySelectorAll('#element-table th').forEach(th => {
        th.classList.remove('sort-asc', 'sort-desc');
        if (parseInt(th.dataset.col) === sortColumn) {
          th.classList.add(sortAscending ? 'sort-asc' : 'sort-desc');
        }
      });
    }

    function selectElements() {
      const selectedRows = document.querySelectorAll('#table-body tr.selected');
      if (selectedRows.length === 0) return;

      const names = Array.from(selectedRows).map(r => r.dataset.name);
      const isCollection = selectedRows[0].dataset.isCollection === 'true';

      if (isCollection && names.length === 1) {
        const collection = collections.find(c => c.name === names[0]);
        if (collection && collection.items?.length > 0) {
          window.searchSelect.selectItems(collection.items);
        }
      } else {
        window.searchSelect.selectItems(names);
      }
    }

    function setStatus(msg) {
      document.getElementById('status-bar').textContent = msg;
    }

    document.getElementById('filter').addEventListener('input', () => renderTable());
    document.getElementById('btn-select').addEventListener('click', selectElements);

    document.querySelectorAll('#element-table th').forEach(th => {
      th.addEventListener('click', (e) => {
        if (e.target.classList.contains('resize-handle')) return;
        const col = parseInt(th.dataset.col);
        if (sortColumn === col) {
          sortAscending = !sortAscending;
        } else {
          sortColumn = col;
          sortAscending = true;
        }
        renderTable();
      });

      const handle = document.createElement('div');
      handle.className = 'resize-handle';
      th.appendChild(handle);
    });

    let resizingCol = null;
    let startX = 0;
    let startWidth = 0;

    document.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('resize-handle')) {
        const th = e.target.parentElement;
        resizingCol = th;
        startX = e.pageX;
        startWidth = th.offsetWidth;
        e.target.classList.add('resizing');
        document.body.style.cursor = 'col-resize';
        e.preventDefault();
      }
    });

    document.addEventListener('mousemove', (e) => {
      if (resizingCol) {
        const diff = e.pageX - startX;
        const newWidth = Math.max(30, startWidth + diff);
        resizingCol.style.width = newWidth + 'px';
        resizingCol.style.minWidth = newWidth + 'px';
        resizingCol.style.maxWidth = newWidth + 'px';
      }
    });

    document.addEventListener('mouseup', () => {
      if (resizingCol) {
        document.querySelectorAll('.resize-handle').forEach(h => h.classList.remove('resizing'));
        document.body.style.cursor = '';
        resizingCol = null;
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        selectElements();
      }
    });

    window.searchSelect.onSelectionChanged?.((selectedItems) => {
      document.querySelectorAll('#table-body tr').forEach(row => {
        row.classList.toggle('selected', selectedItems.includes(row.dataset.name));
      });
      updateStatus();
    });
  </script>
</body>
</html>
