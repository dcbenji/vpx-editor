<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Render Probe Manager</title>
  <script>
    var theme = new URLSearchParams(window.location.search).get('theme');
    if (theme) document.documentElement.setAttribute('data-theme', theme);
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #1e1e1e;
      --bg-panel: #252526;
      --bg-toolbar: #333333;
      --border-color: #3c3c3c;
      --text-primary: #cccccc;
      --text-secondary: #888888;
      --accent: #0078d4;
      --accent-hover: #1084d8;
    }

    [data-theme="light"] {
      --bg-dark: #f3f3f3;
      --bg-panel: #ffffff;
      --bg-toolbar: #e8e8e8;
      --border-color: #d4d4d4;
      --text-primary: #333333;
      --text-secondary: #666666;
      --accent: #0078d4;
      --accent-hover: #106ebe;
    }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    ::-webkit-scrollbar-corner { background: var(--bg-dark); }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg-dark);
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border-color);
    }

    .toolbar-btn {
      padding: 6px 12px;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 12px;
    }

    .toolbar-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
    }

    .toolbar-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .toolbar-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .toolbar-btn.primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .toolbar-spacer {
      flex: 1;
    }

    #content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #probe-list-container {
      width: 200px;
      flex-shrink: 0;
      overflow: auto;
      border-right: 1px solid var(--border-color);
      background: var(--bg-panel);
    }

    .probe-item {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .probe-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .probe-item.selected {
      background: var(--accent);
      color: white;
    }

    .probe-item.protected {
      font-style: italic;
    }

    #properties-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
      overflow-y: auto;
      padding: 0;
    }

    .prop-group {
      padding: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .prop-group-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .prop-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }

    .prop-row:last-child {
      margin-bottom: 0;
    }

    .prop-label {
      width: 100px;
      flex-shrink: 0;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .prop-input {
      flex: 1;
      padding: 4px 8px;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 12px;
    }

    .prop-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .prop-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .prop-input[type="checkbox"] {
      width: 16px;
      height: 16px;
      flex: none;
    }

    .prop-select {
      flex: 1;
      padding: 4px 8px;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      border-radius: 3px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      background-image: url('../../shared/icons/dropdown-arrow.svg');
      background-repeat: no-repeat;
      background-position: right 8px center;
      padding-right: 24px;
    }

    .prop-select:focus {
      outline: none;
    }

    .prop-select option {
      background: var(--bg-panel);
      color: var(--text-primary);
    }

    .prop-select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .radio-row {
      margin-bottom: 6px;
    }

    .radio-row label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .radio-row input[type="radio"] {
      margin: 0;
    }

    .radio-row input[type="radio"]:disabled + span {
      opacity: 0.5;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .slider-row input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      background: var(--border-color);
      border-radius: 2px;
    }

    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .slider-row input[type="range"]:disabled {
      opacity: 0.5;
    }

    .slider-label {
      min-width: 60px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-secondary);
    }

    #status-bar {
      padding: 4px 12px;
      background: var(--bg-toolbar);
      border-top: 1px solid var(--border-color);
      font-size: 11px;
      color: var(--text-secondary);
    }

    .prompt-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .prompt-overlay.hidden {
      display: none;
    }

    .prompt-dialog {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
      min-width: 300px;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .prompt-message {
      margin-bottom: 12px;
      font-size: 13px;
    }

    .prompt-input {
      width: 100%;
      padding: 8px 10px;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .prompt-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .prompt-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <div class="toolbar-spacer"></div>
      <button id="btn-new" class="toolbar-btn primary">New</button>
      <button id="btn-rename" class="toolbar-btn">Rename</button>
      <button id="btn-delete" class="toolbar-btn">Delete</button>
    </div>

    <div id="content">
      <div id="probe-list-container">
        <div id="probe-list"></div>
      </div>

      <div id="properties-panel">
        <div class="empty-state" id="empty-state">Select a render probe to view properties</div>
        <div id="properties-container" style="display: none;">
          <div class="prop-group">
            <div class="prop-group-title">Type</div>
            <div class="radio-row">
              <label>
                <input type="radio" name="probe-type" id="type-plane" value="plane_reflection">
                <span>Plane Reflection</span>
              </label>
            </div>
            <div class="radio-row">
              <label>
                <input type="radio" name="probe-type" id="type-screen" value="screen_space_transparency">
                <span>Screen Space Transparency</span>
              </label>
            </div>
          </div>

          <div class="prop-group">
            <div class="prop-group-title">Roughness</div>
            <div class="slider-row">
              <input type="range" id="roughness" min="0" max="12" step="1" value="0">
              <span class="slider-label" id="roughness-label">Level: 0</span>
            </div>
          </div>

          <div class="prop-group" id="reflection-plane-group">
            <div class="prop-group-title">Reflection Plane</div>
            <div class="prop-row">
              <label class="prop-label">Normal X</label>
              <input type="number" class="prop-input" id="plane-x" step="0.01">
            </div>
            <div class="prop-row">
              <label class="prop-label">Normal Y</label>
              <input type="number" class="prop-input" id="plane-y" step="0.01">
            </div>
            <div class="prop-row">
              <label class="prop-label">Normal Z</label>
              <input type="number" class="prop-input" id="plane-z" step="0.01">
            </div>
            <div class="prop-row">
              <label class="prop-label">Distance</label>
              <input type="number" class="prop-input" id="plane-w" step="0.01">
            </div>
          </div>

          <div class="prop-group" id="reflection-mode-group">
            <div class="prop-group-title">Reflection Mode</div>
            <div class="prop-row">
              <select id="reflection-mode" class="prop-select">
                <option value="none">Disabled</option>
                <option value="balls">Balls Only</option>
                <option value="static">Static Only</option>
                <option value="static_and_balls">Static & Balls</option>
                <option value="static_and_dynamic">Static & Unsynced Dynamic</option>
                <option value="dynamic">Dynamic</option>
              </select>
            </div>
          </div>

          <div class="prop-group" id="lightmaps-group">
            <div class="prop-row">
              <label>
                <input type="checkbox" id="disable-lightmaps" class="prop-input">
                <span style="margin-left: 8px;">Disable lightmaps in reflections</span>
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="status-bar">Ready</div>

    <div id="rename-overlay" class="prompt-overlay hidden">
      <div class="prompt-dialog">
        <div class="prompt-message">Enter new name:</div>
        <input type="text" id="rename-input" class="prompt-input">
        <div class="prompt-buttons">
          <button id="rename-cancel" class="toolbar-btn">Cancel</button>
          <button id="rename-ok" class="toolbar-btn primary">OK</button>
        </div>
      </div>
    </div>

    <div id="confirm-overlay" class="prompt-overlay hidden">
      <div class="prompt-dialog">
        <div class="prompt-message" id="confirm-message"></div>
        <div class="prompt-buttons">
          <button id="confirm-cancel" class="toolbar-btn">Cancel</button>
          <button id="confirm-ok" class="toolbar-btn primary">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let probes = {};
    let extractedDir = null;
    let selectedProbe = null;

    const PLAYFIELD_PROBE_NAME = 'Playfield Reflections';

    function isPlayfieldProbe(name) {
      return name === PLAYFIELD_PROBE_NAME;
    }

    let uiDisabled = true;

    function setUIDisabled(disabled) {
      uiDisabled = disabled;
      document.getElementById('btn-new').disabled = disabled;
      document.getElementById('btn-rename').disabled = disabled;
      document.getElementById('btn-delete').disabled = disabled;
    }

    if (window.renderProbeManager) {
      window.renderProbeManager.onInit((data) => {
        extractedDir = data.extractedDir;
        probes = data.probes || {};
        if (data.theme) document.documentElement.setAttribute('data-theme', data.theme);
        setUIDisabled(false);
        renderList();
        setStatus(`Loaded ${Object.keys(probes).length} render probes`);
      });

      window.renderProbeManager.onThemeChanged((theme) => {
        document.documentElement.setAttribute('data-theme', theme);
      });

      window.renderProbeManager.onSetDisabled((disabled) => {
        setUIDisabled(disabled);
        if (disabled) {
          probes = {};
          extractedDir = null;
          selectedProbe = null;
          renderList();
          document.getElementById('empty-state').style.display = 'block';
          document.getElementById('properties-container').style.display = 'none';
          setStatus('No table loaded');
        }
      });
    } else {
      document.getElementById('status-bar').textContent = 'Error: Preload failed';
    }

    function getDefaultProbe() {
      return {
        type_: 'plane_reflection',
        name: 'New Render Probe',
        roughness: 0,
        reflection_plane: { x: 0, y: 0, z: 1, w: 0 },
        reflection_mode: 'dynamic',
        disable_light_reflection: false
      };
    }

    function renderList() {
      const list = document.getElementById('probe-list');
      list.innerHTML = '';

      const probeNames = Object.keys(probes).sort((a, b) => {
        if (a === PLAYFIELD_PROBE_NAME) return -1;
        if (b === PLAYFIELD_PROBE_NAME) return 1;
        return a.toLowerCase().localeCompare(b.toLowerCase());
      });

      for (const name of probeNames) {
        const item = document.createElement('div');
        item.className = 'probe-item';
        if (name === selectedProbe) item.classList.add('selected');
        if (isPlayfieldProbe(name)) item.classList.add('protected');
        item.textContent = name;
        item.dataset.name = name;
        item.addEventListener('click', () => selectProbe(name));
        list.appendChild(item);
      }

      updateButtonStates();
    }

    function selectProbe(name) {
      if (selectedProbe && selectedProbe !== name) {
        saveProbeFromUI();
      }

      selectedProbe = name;

      document.querySelectorAll('.probe-item').forEach(el => {
        el.classList.toggle('selected', el.dataset.name === name);
      });

      loadProbeToUI(probes[name]);
      updateButtonStates();
    }

    function loadProbeToUI(probe) {
      if (!probe) {
        document.getElementById('empty-state').style.display = 'block';
        document.getElementById('properties-container').style.display = 'none';
        return;
      }

      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('properties-container').style.display = 'block';

      const isProtected = isPlayfieldProbe(probe.name);
      const isPlaneReflection = probe.type_ === 'plane_reflection';

      document.getElementById('type-plane').checked = isPlaneReflection;
      document.getElementById('type-screen').checked = !isPlaneReflection;
      document.getElementById('type-plane').disabled = isProtected;
      document.getElementById('type-screen').disabled = isProtected;

      document.getElementById('roughness').value = probe.roughness || 0;
      document.getElementById('roughness-label').textContent = `Level: ${probe.roughness || 0}`;
      document.getElementById('roughness').disabled = false;

      const plane = probe.reflection_plane || { x: 0, y: 0, z: 1, w: 0 };
      document.getElementById('plane-x').value = plane.x;
      document.getElementById('plane-y').value = plane.y;
      document.getElementById('plane-z').value = plane.z;
      document.getElementById('plane-w').value = plane.w;

      const planeDisabled = !isPlaneReflection || isProtected;
      document.getElementById('plane-x').disabled = planeDisabled;
      document.getElementById('plane-y').disabled = planeDisabled;
      document.getElementById('plane-z').disabled = planeDisabled;
      document.getElementById('plane-w').disabled = planeDisabled;

      document.getElementById('reflection-mode').value = probe.reflection_mode || 'dynamic';
      document.getElementById('reflection-mode').disabled = !isPlaneReflection;

      document.getElementById('disable-lightmaps').checked = probe.disable_light_reflection || false;
      document.getElementById('disable-lightmaps').disabled = !isPlaneReflection;
    }

    function saveProbeFromUI() {
      if (!selectedProbe || !probes[selectedProbe]) return;

      const probe = probes[selectedProbe];
      const isProtected = isPlayfieldProbe(probe.name);

      if (!isProtected) {
        probe.type_ = document.getElementById('type-plane').checked ? 'plane_reflection' : 'screen_space_transparency';
      }

      probe.roughness = parseInt(document.getElementById('roughness').value, 10);

      if (probe.type_ === 'plane_reflection' && !isProtected) {
        probe.reflection_plane = {
          x: parseFloat(document.getElementById('plane-x').value) || 0,
          y: parseFloat(document.getElementById('plane-y').value) || 0,
          z: parseFloat(document.getElementById('plane-z').value) || 0,
          w: parseFloat(document.getElementById('plane-w').value) || 0
        };
      }

      if (probe.type_ === 'plane_reflection') {
        probe.reflection_mode = document.getElementById('reflection-mode').value;
        probe.disable_light_reflection = document.getElementById('disable-lightmaps').checked;
      }
    }

    function updateButtonStates() {
      if (uiDisabled) return;
      const hasSelection = selectedProbe !== null;
      const isProtected = hasSelection && isPlayfieldProbe(selectedProbe);

      document.getElementById('btn-rename').disabled = !hasSelection || isProtected;
      document.getElementById('btn-delete').disabled = !hasSelection || isProtected;
    }

    async function saveProbes() {
      const probesArray = Object.values(probes);
      await window.renderProbeManager.writeFile(`${extractedDir}/renderprobes.json`, JSON.stringify(probesArray, null, 2));
    }

    async function addProbe() {
      const probe = getDefaultProbe();
      let baseName = probe.name;
      let counter = 1;
      while (probes[probe.name]) {
        probe.name = `${baseName} ${counter++}`;
      }

      window.renderProbeManager.undoBegin('Add Render Probe');
      window.renderProbeManager.undoMarkRenderProbes();
      window.renderProbeManager.undoMarkRenderProbeCreate(probe.name);

      probes[probe.name] = probe;
      await saveProbes();
      selectedProbe = probe.name;
      renderList();
      loadProbeToUI(probe);
      setStatus(`Added: ${probe.name}`);

      window.renderProbeManager.undoEnd();
      window.renderProbeManager.notifyRenderProbesChanged();
    }

    async function renameProbe() {
      if (!selectedProbe || isPlayfieldProbe(selectedProbe)) return;

      const overlay = document.getElementById('rename-overlay');
      const input = document.getElementById('rename-input');
      input.value = selectedProbe;
      overlay.classList.remove('hidden');
      input.focus();
      input.select();

      return new Promise((resolve) => {
        const cleanup = () => {
          overlay.classList.add('hidden');
          document.getElementById('rename-ok').onclick = null;
          document.getElementById('rename-cancel').onclick = null;
          input.onkeydown = null;
        };

        const doRename = async () => {
          const newName = input.value.trim();
          cleanup();
          if (!newName || newName === selectedProbe) return;

          if (probes[newName]) {
            setStatus(`Render probe "${newName}" already exists`);
            return;
          }

          if (newName === PLAYFIELD_PROBE_NAME) {
            setStatus(`Cannot use reserved name "${PLAYFIELD_PROBE_NAME}"`);
            return;
          }

          const oldName = selectedProbe;

          window.renderProbeManager.undoBegin('Rename Render Probe');
          window.renderProbeManager.undoMarkRenderProbes();

          const probe = probes[oldName];
          delete probes[oldName];
          probe.name = newName;
          probes[newName] = probe;

          await saveProbes();
          selectedProbe = newName;
          renderList();
          loadProbeToUI(probe);
          setStatus(`Renamed: ${oldName} → ${newName}`);

          window.renderProbeManager.undoEnd();
          window.renderProbeManager.notifyRenderProbesChanged();
        };

        document.getElementById('rename-ok').onclick = doRename;
        document.getElementById('rename-cancel').onclick = cleanup;
        input.onkeydown = (e) => {
          if (e.key === 'Enter') doRename();
          else if (e.key === 'Escape') cleanup();
        };
      });
    }

    async function deleteProbe() {
      if (!selectedProbe || isPlayfieldProbe(selectedProbe)) return;

      const confirmed = await showConfirm(`Are you sure you want to remove this render probe?`);
      if (!confirmed) return;

      const probeData = probes[selectedProbe];
      const deletedName = selectedProbe;

      window.renderProbeManager.undoBegin('Delete Render Probe');
      window.renderProbeManager.undoMarkRenderProbes();
      window.renderProbeManager.undoMarkRenderProbeDelete(deletedName, probeData);

      delete probes[selectedProbe];
      await saveProbes();

      setStatus(`Deleted: ${deletedName}`);
      selectedProbe = null;
      renderList();
      document.getElementById('empty-state').style.display = 'block';
      document.getElementById('properties-container').style.display = 'none';

      window.renderProbeManager.undoEnd();
      window.renderProbeManager.notifyRenderProbesChanged();
    }

    function showConfirm(message) {
      return new Promise((resolve) => {
        const overlay = document.getElementById('confirm-overlay');
        const msgEl = document.getElementById('confirm-message');
        const okBtn = document.getElementById('confirm-ok');
        const cancelBtn = document.getElementById('confirm-cancel');

        msgEl.textContent = message;
        overlay.classList.remove('hidden');
        okBtn.focus();

        const cleanup = () => {
          overlay.classList.add('hidden');
          okBtn.onclick = null;
          cancelBtn.onclick = null;
          document.removeEventListener('keydown', keyHandler);
        };

        const keyHandler = (e) => {
          if (e.key === 'Enter') { cleanup(); resolve(true); }
          else if (e.key === 'Escape') { cleanup(); resolve(false); }
        };

        document.addEventListener('keydown', keyHandler);
        okBtn.onclick = () => { cleanup(); resolve(true); };
        cancelBtn.onclick = () => { cleanup(); resolve(false); };
      });
    }

    function setStatus(msg) {
      document.getElementById('status-bar').textContent = msg;
    }

    document.getElementById('btn-new').addEventListener('click', addProbe);
    document.getElementById('btn-rename').addEventListener('click', renameProbe);
    document.getElementById('btn-delete').addEventListener('click', deleteProbe);

    document.querySelectorAll('input[name="probe-type"]').forEach(radio => {
      radio.addEventListener('change', async () => {
        if (!selectedProbe) return;

        window.renderProbeManager.undoBegin('Change Render Probe Type');
        window.renderProbeManager.undoMarkRenderProbes();

        saveProbeFromUI();
        await saveProbes();
        loadProbeToUI(probes[selectedProbe]);
        setStatus(`Updated type for ${selectedProbe}`);

        window.renderProbeManager.undoEnd();
        window.renderProbeManager.notifyRenderProbesChanged();
      });
    });

    document.getElementById('roughness').addEventListener('input', () => {
      const val = document.getElementById('roughness').value;
      document.getElementById('roughness-label').textContent = `Level: ${val}`;
    });

    document.getElementById('roughness').addEventListener('change', async () => {
      if (!selectedProbe) return;

      window.renderProbeManager.undoBegin('Change Render Probe Roughness');
      window.renderProbeManager.undoMarkRenderProbes();

      saveProbeFromUI();
      await saveProbes();
      setStatus(`Updated roughness for ${selectedProbe}`);

      window.renderProbeManager.undoEnd();
      window.renderProbeManager.notifyRenderProbesChanged();
    });

    ['plane-x', 'plane-y', 'plane-z', 'plane-w'].forEach(id => {
      document.getElementById(id).addEventListener('change', async () => {
        if (!selectedProbe) return;

        window.renderProbeManager.undoBegin('Change Reflection Plane');
        window.renderProbeManager.undoMarkRenderProbes();

        saveProbeFromUI();
        await saveProbes();
        setStatus(`Updated reflection plane for ${selectedProbe}`);

        window.renderProbeManager.undoEnd();
        window.renderProbeManager.notifyRenderProbesChanged();
      });
    });

    document.getElementById('reflection-mode').addEventListener('change', async () => {
      if (!selectedProbe) return;

      window.renderProbeManager.undoBegin('Change Reflection Mode');
      window.renderProbeManager.undoMarkRenderProbes();

      saveProbeFromUI();
      await saveProbes();
      setStatus(`Updated reflection mode for ${selectedProbe}`);

      window.renderProbeManager.undoEnd();
      window.renderProbeManager.notifyRenderProbesChanged();
    });

    document.getElementById('disable-lightmaps').addEventListener('change', async () => {
      if (!selectedProbe) return;

      window.renderProbeManager.undoBegin('Toggle Disable Lightmaps');
      window.renderProbeManager.undoMarkRenderProbes();

      saveProbeFromUI();
      await saveProbes();
      setStatus(`Updated lightmaps setting for ${selectedProbe}`);

      window.renderProbeManager.undoEnd();
      window.renderProbeManager.notifyRenderProbesChanged();
    });
  </script>
</body>
</html>
