<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Dimensions Manager</title>
  <script>
    var theme = new URLSearchParams(window.location.search).get('theme');
    if (theme) document.documentElement.setAttribute('data-theme', theme);
  </script>
  <link rel="stylesheet" href="../../shared/window-base.css">
  <link rel="stylesheet" href="dimensions-manager-window.css">
</head>
<body>
  <div id="app">
    <div class="dimensions-body">
      <div class="dimensions-list-panel">
        <div class="dimensions-list-container">
          <table id="dimensions-table">
            <thead>
              <tr>
                <th data-sort="name">Manufacturer</th>
                <th data-sort="width">Width</th>
                <th data-sort="height">Height</th>
                <th data-sort="glassBottom">Bot.</th>
                <th data-sort="glassTop">Top</th>
                <th data-sort="comment">Comment</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      <div class="dimensions-props-panel">
        <div class="dimensions-prop-group">
          <div class="dimensions-prop-title">Selected Reference</div>
          <div class="dimensions-prop-section">Size in inches:</div>
          <div class="dimensions-prop-row">
            <span class="dimensions-prop-label">Width</span>
            <input type="text" id="dim-ref-width-in" class="win-input dimensions-prop-input" readonly>
          </div>
          <div class="dimensions-prop-row">
            <span class="dimensions-prop-label">Height</span>
            <input type="text" id="dim-ref-height-in" class="win-input dimensions-prop-input" readonly>
          </div>
          <div class="dimensions-prop-section">Size in VP units:</div>
          <div class="dimensions-prop-row">
            <span class="dimensions-prop-label">Width</span>
            <input type="text" id="dim-ref-width-vp" class="win-input dimensions-prop-input" readonly>
          </div>
          <div class="dimensions-prop-row">
            <span class="dimensions-prop-label">Height</span>
            <input type="text" id="dim-ref-height-vp" class="win-input dimensions-prop-input" readonly>
          </div>
          <div class="dimensions-prop-section">Glass pos. in inches:</div>
          <div class="dimensions-prop-row">
            <span class="dimensions-prop-label">Top</span>
            <input type="text" id="dim-ref-glass-top" class="win-input dimensions-prop-input" readonly>
          </div>
          <div class="dimensions-prop-row">
            <span class="dimensions-prop-label">Bottom</span>
            <input type="text" id="dim-ref-glass-bottom" class="win-input dimensions-prop-input" readonly>
          </div>
          <div class="dimensions-prop-row">
            <span class="dimensions-prop-label">Aspect Ratio</span>
            <span class="dimensions-prop-value" id="dim-ref-aspect-ratio">-</span>
          </div>
        </div>
        <div class="dimensions-prop-group">
          <div class="dimensions-prop-title">Edited Table</div>
          <div class="dimensions-prop-section">Size in inches:</div>
          <div class="dimensions-prop-row">
            <span class="dimensions-prop-label">Width</span>
            <input type="text" id="dim-cur-width-in" class="win-input dimensions-prop-input editable">
          </div>
          <div class="dimensions-prop-row">
            <span class="dimensions-prop-label">Height</span>
            <input type="text" id="dim-cur-height-in" class="win-input dimensions-prop-input editable">
          </div>
          <div class="dimensions-prop-section">Size in VP units:</div>
          <div class="dimensions-prop-row">
            <span class="dimensions-prop-label">Width</span>
            <input type="text" id="dim-cur-width-vp" class="win-input dimensions-prop-input editable">
          </div>
          <div class="dimensions-prop-row">
            <span class="dimensions-prop-label">Height</span>
            <input type="text" id="dim-cur-height-vp" class="win-input dimensions-prop-input editable">
          </div>
          <div class="dimensions-prop-section">Glass pos. in inches:</div>
          <div class="dimensions-prop-row">
            <span class="dimensions-prop-label">Top</span>
            <input type="text" id="dim-cur-glass-top" class="win-input dimensions-prop-input editable">
          </div>
          <div class="dimensions-prop-row">
            <span class="dimensions-prop-label">Bottom</span>
            <input type="text" id="dim-cur-glass-bottom" class="win-input dimensions-prop-input editable">
          </div>
          <div class="dimensions-prop-row">
            <span class="dimensions-prop-label">Aspect Ratio</span>
            <span class="dimensions-prop-value" id="dim-cur-aspect-ratio">-</span>
          </div>
        </div>
      </div>
    </div>
    <div class="dimensions-footer">
      <button class="win-btn" id="dim-copy-btn" title="Copy selected reference to edited table">Copy</button>
      <div class="dimensions-footer-spacer"></div>
      <button class="win-btn" id="dim-close-btn">Close</button>
      <button class="win-btn primary" id="dim-apply-btn" disabled>Apply</button>
    </div>
  </div>

  <script type="module" src="./dimensions-manager-window.ts"></script>
</body>
</html>
