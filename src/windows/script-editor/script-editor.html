<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Script Editor</title>
  <script>
    var theme = new URLSearchParams(window.location.search).get('theme');
    if (theme) document.documentElement.setAttribute('data-theme', theme);
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #1e1e1e;
      --bg-panel: #252526;
      --bg-toolbar: #333333;
      --border-color: #3c3c3c;
      --text-primary: #cccccc;
      --text-secondary: #888888;
      --accent: #0078d4;
    }

    [data-theme="light"] {
      --bg-dark: #f3f3f3;
      --bg-panel: #ffffff;
      --bg-toolbar: #e8e8e8;
      --border-color: #d4d4d4;
      --text-primary: #333333;
      --text-secondary: #666666;
    }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    ::-webkit-scrollbar-corner { background: var(--bg-dark); }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg-dark);
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border-color);
    }

    .toolbar-title {
      font-weight: 500;
    }

    .toolbar-spacer {
      flex: 1;
    }

    .toolbar-btn {
      padding: 6px 12px;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 12px;
    }

    .toolbar-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .toolbar-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .toolbar-btn.primary:hover:not(:disabled) {
      background: #1084d8;
    }

    .toolbar-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #editor-container {
      flex: 1;
      overflow: hidden;
    }

    #status-bar {
      padding: 4px 12px;
      background: var(--bg-toolbar);
      border-top: 1px solid var(--border-color);
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
    }

    .modified-indicator {
      color: #e8ab53;
    }

    .info-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .info-modal.hidden {
      display: none;
    }

    .info-modal-backdrop {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
    }

    .info-modal-content {
      position: relative;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
      min-width: 320px;
      max-width: 450px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .info-modal-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .info-modal-message {
      font-size: 13px;
      color: var(--text-primary);
      margin-bottom: 20px;
    }

    .info-modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .info-modal-btn {
      padding: 6px 20px;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 12px;
    }

    .info-modal-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .info-modal-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .info-modal-btn.primary:hover {
      background: #1084d8;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <span class="toolbar-title" id="title">script.vbs</span>
      <div class="toolbar-spacer"></div>
      <button id="btn-save" class="toolbar-btn primary" disabled>Save</button>
    </div>

    <div id="editor-container"></div>

    <div id="status-bar">
      <span id="status">Ready</span>
      <span id="cursor-pos">Ln 1, Col 1</span>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <script>
    console.log('Script Editor loading, preload:', typeof window.scriptEditor);

    let editor = null;
    let originalContent = '';
    let modified = false;
    let extractedDir = null;

    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });

    function updateTitle() {
      document.getElementById('title').textContent = `script.vbs${modified ? ' *' : ''}`;
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    async function saveScript() {
      if (!editor) return;

      const content = editor.getValue();
      const result = await window.scriptEditor.saveScript(content);

      if (result.success) {
        originalContent = content;
        modified = false;
        updateTitle();
        setStatus('Saved');
        document.getElementById('btn-save').disabled = true;
        window.scriptEditor.notifyScriptChanged();
      } else {
        setStatus(`Save failed: ${result.error}`);
      }
    }

    require(['vs/editor/editor.main'], function () {
      window.scriptEditor.onInit((data) => {
        console.log('Script Editor received init');
        extractedDir = data.extractedDir;
        originalContent = data.script || '';

        if (data.theme) {
          document.documentElement.setAttribute('data-theme', data.theme);
        }

        const container = document.getElementById('editor-container');
        const monacoTheme = data.theme === 'light' ? 'vs' : 'vs-dark';

        editor = monaco.editor.create(container, {
          value: originalContent,
          language: 'vb',
          theme: monacoTheme,
          automaticLayout: true,
          fontSize: 14,
          fontFamily: "'Consolas', 'Monaco', 'Menlo', monospace",
          lineNumbers: 'on',
          minimap: { enabled: true },
          scrollBeyondLastLine: false,
          wordWrap: 'off',
          tabSize: 4,
          insertSpaces: false,
          renderWhitespace: 'selection',
          bracketPairColorization: { enabled: true },
        });

        editor.onDidChangeModelContent(() => {
          const isModified = editor.getValue() !== originalContent;
          if (modified !== isModified) {
            modified = isModified;
            updateTitle();
            document.getElementById('btn-save').disabled = !modified;
          }
        });

        editor.onDidChangeCursorPosition((e) => {
          document.getElementById('cursor-pos').textContent = `Ln ${e.position.lineNumber}, Col ${e.position.column}`;
        });

        editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => {
          saveScript();
        });

        modified = false;
        document.getElementById('btn-save').disabled = true;
        setStatus('Ready');
      });

      window.scriptEditor.onThemeChanged((theme) => {
        document.documentElement.setAttribute('data-theme', theme);
        if (editor) {
          monaco.editor.setTheme(theme === 'light' ? 'vs' : 'vs-dark');
        }
      });

      window.scriptEditor.onScriptUndone((content) => {
        if (editor) {
          const position = editor.getPosition();
          originalContent = content;
          editor.setValue(content);
          if (position) {
            editor.setPosition(position);
          }
          modified = false;
          updateTitle();
          document.getElementById('btn-save').disabled = true;
          setStatus('Script restored from undo');
        }
      });
    });

    document.getElementById('btn-save').addEventListener('click', saveScript);

    window.addEventListener('beforeunload', (e) => {
      if (modified) {
        e.preventDefault();
        e.returnValue = '';
      }
    });

    window.scriptEditor.onCheckCanClose(async () => {
      if (modified) {
        const discard = await window.scriptEditor.showUnsavedChangesDialog();
        window.scriptEditor.respondCanClose(discard);
      } else {
        window.scriptEditor.respondCanClose(true);
      }
    });
  </script>
</body>
</html>
