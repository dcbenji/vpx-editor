<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rename</title>
  <script>
    var theme = new URLSearchParams(window.location.search).get('theme');
    if (theme) document.documentElement.setAttribute('data-theme', theme);
  </script>
  <link rel="stylesheet" href="../../shared/window-base.css">
  <link rel="stylesheet" href="collection-prompt-window.css">
</head>
<body>
  <div id="app">
    <div class="prompt-body">
      <input type="text" id="prompt-input" class="win-input" placeholder="Enter name">
      <div id="prompt-error" class="prompt-error"></div>
    </div>
    <div class="prompt-footer">
      <button class="win-btn" id="prompt-cancel">Cancel</button>
      <button class="win-btn primary" id="prompt-ok">OK</button>
    </div>
  </div>

  <script type="module" src="./rename-prompt-window.ts"></script>
</body>
</html>
