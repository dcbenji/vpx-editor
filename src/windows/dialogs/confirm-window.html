<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Confirm</title>
  <script>
    var theme = new URLSearchParams(window.location.search).get('theme');
    if (theme) document.documentElement.setAttribute('data-theme', theme);
  </script>
  <link rel="stylesheet" href="../../shared/window-base.css">
  <link rel="stylesheet" href="confirm-window.css">
</head>
<body>
  <div id="app">
    <div class="confirm-body">
      <div class="confirm-title" id="confirm-title"></div>
      <div class="confirm-message" id="confirm-message"></div>
      <div class="confirm-select-container" id="confirm-select-container">
        <select id="confirm-select" class="win-select"></select>
      </div>
    </div>
    <div class="confirm-footer" id="confirm-footer"></div>
  </div>

  <script type="module" src="./confirm-window.ts"></script>
</body>
</html>
