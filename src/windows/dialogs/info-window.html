<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Information</title>
  <script>
    var theme = new URLSearchParams(window.location.search).get('theme');
    if (theme) document.documentElement.setAttribute('data-theme', theme);
  </script>
  <link rel="stylesheet" href="../../shared/window-base.css">
  <link rel="stylesheet" href="info-window.css">
</head>
<body>
  <div id="app">
    <div class="info-body">
      <div class="info-title" id="info-title"></div>
      <div class="info-message" id="info-message"></div>
      <div class="info-detail" id="info-detail"></div>
    </div>
    <div class="info-footer">
      <button class="win-btn primary" id="info-ok">OK</button>
    </div>
  </div>

  <script type="module" src="./info-window.ts"></script>
</body>
</html>
