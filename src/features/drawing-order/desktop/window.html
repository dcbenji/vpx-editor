<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Drawing Order</title>
  <script>
    var theme = new URLSearchParams(window.location.search).get('theme');
    if (theme) document.documentElement.setAttribute('data-theme', theme);
  </script>
  <link rel="stylesheet" href="../../../shared/window-base.css">
  <link rel="stylesheet" href="window.css">
</head>
<body>
  <div class="drawing-order-container">
    <div class="drawing-order-table-container">
      <table id="drawing-order-table">
        <thead>
          <tr>
            <th style="width: 200px">Name</th>
            <th style="width: 100px">Height/Z</th>
            <th style="width: 100px">Type</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="drawing-order-reorder-buttons">
      <button class="win-btn" id="drawing-order-up">Up</button>
      <button class="win-btn" id="drawing-order-down">Down</button>
    </div>
    <div class="drawing-order-footer">
      <button class="win-btn" id="drawing-order-cancel">Cancel</button>
      <button class="win-btn primary" id="drawing-order-ok">OK</button>
    </div>
  </div>
  <script type="module" src="./window.ts"></script>
</body>
</html>
