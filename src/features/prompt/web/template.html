<div id="prompt-overlay" class="prompt-overlay hidden">
  <div class="prompt-dialog">
    <div class="prompt-header">
      <span class="prompt-title" id="prompt-title">Rename</span>
      <button class="prompt-close" id="prompt-close">&times;</button>
    </div>
    <input type="text" id="prompt-input" class="prompt-input">
    <div id="prompt-error" class="prompt-error"></div>
    <div class="prompt-buttons">
      <button id="prompt-cancel" class="prompt-btn">Cancel</button>
      <button id="prompt-ok" class="prompt-btn primary">OK</button>
    </div>
  </div>
</div>
