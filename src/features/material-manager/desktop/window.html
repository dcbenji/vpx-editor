<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Material Manager</title>
  <link rel="stylesheet" href="../../../shared/window-base.css">
  <link rel="stylesheet" href="../../../shared/manager-content.css">
  <link rel="stylesheet" href="../../prompt/shared/styles.css">
  <link rel="stylesheet" href="./window.css">
  <script>
    var theme = new URLSearchParams(window.location.search).get('theme');
    if (theme) document.documentElement.setAttribute('data-theme', theme);
  </script>
</head>
<body>
  <div id="app">
    <div class="manager-toolbar">
      <input type="text" id="filter" placeholder="Filter...">
      <div class="manager-toolbar-spacer"></div>
      <button id="btn-add" class="primary">New</button>
      <button id="btn-clone">Clone</button>
    </div>

    <div class="manager-content">
      <div class="manager-list" id="material-list-container">
        <table id="material-list">
          <thead>
            <tr>
              <th style="width: 28px;"></th>
              <th class="sortable" data-sort="name">Name</th>
              <th class="sortable" data-sort="used" style="width: 50px;">Used</th>
            </tr>
          </thead>
          <tbody id="material-list-body"></tbody>
        </table>
      </div>

      <div class="manager-preview" id="details-panel">
        <div class="manager-empty-state" id="empty-state">Select a material to view properties</div>
        <div id="properties-container" style="display: none;"></div>
      </div>
    </div>

    <div class="manager-status" id="status-bar">Ready</div>

    <div id="edit-overlay" class="prompt-overlay hidden">
      <div class="prompt-dialog" style="min-width: 380px;">
        <div class="prompt-title" id="edit-title">New Material</div>
        <div id="edit-form"></div>
        <div class="prompt-buttons">
          <button id="edit-cancel" class="prompt-btn">Cancel</button>
          <button id="edit-ok" class="prompt-btn primary">OK</button>
        </div>
      </div>
    </div>

    <div id="context-menu" class="context-menu hidden">
      <div class="context-menu-item" data-action="rename">Rename</div>
      <div class="context-menu-item" data-action="clone">Clone</div>
      <div class="context-menu-divider"></div>
      <div class="context-menu-item" data-action="delete">Delete</div>
    </div>

    <div id="confirm-overlay" class="prompt-overlay hidden">
      <div class="prompt-dialog">
        <div class="prompt-message" id="confirm-message"></div>
        <div class="prompt-buttons">
          <button id="confirm-cancel" class="prompt-btn">Cancel</button>
          <button id="confirm-ok" class="prompt-btn primary">Delete</button>
        </div>
      </div>
    </div>

    <div id="rename-overlay" class="prompt-overlay hidden">
      <div class="prompt-dialog">
        <div class="prompt-header">
          <span class="prompt-title">Rename</span>
          <button class="prompt-close" id="rename-close">&times;</button>
        </div>
        <input type="text" id="rename-input" class="prompt-input" style="margin-bottom: 4px;">
        <div id="rename-error" class="prompt-error"></div>
        <div class="prompt-buttons" style="margin-top: 0;">
          <button id="rename-cancel" class="prompt-btn">Cancel</button>
          <button id="rename-ok" class="prompt-btn primary">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./window.ts"></script>
</body>
</html>
