<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Script Editor</title>
  <link rel="stylesheet" href="../../../shared/window-base.css">
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="stylesheet" href="window.css">
  <script>
    var theme = new URLSearchParams(window.location.search).get('theme');
    if (theme) document.documentElement.setAttribute('data-theme', theme);
  </script>
</head>
<body>
  <div id="app">
    <div class="script-editor-toolbar">
      <label>Item:</label>
      <select id="item-list">
        <option value="">(All Items)</option>
      </select>
      <label>Event:</label>
      <select id="event-list">
        <option value="">(Select Event)</option>
      </select>
      <label>Function:</label>
      <select id="function-list">
        <option value="">(Select Function)</option>
      </select>
    </div>

    <div id="editor-container" class="script-editor-container"></div>

    <div id="status-bar" class="script-editor-status">
      <span id="status">Ready</span>
      <span id="cursor-pos">Ln 1, Col 1</span>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <script type="module" src="./window.ts"></script>
</body>
</html>
