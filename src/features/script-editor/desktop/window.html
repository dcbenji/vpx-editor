<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Script Editor</title>
  <link rel="stylesheet" href="../../../shared/window-base.css">
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="stylesheet" href="window.css">
  <script>
    var theme = new URLSearchParams(window.location.search).get('theme');
    if (theme) document.documentElement.setAttribute('data-theme', theme);
  </script>
</head>
<body>
  <div id="app">
    <div class="script-editor-toolbar">
      <label>Item:</label>
      <select id="item-list">
        <option value="">(All Items)</option>
      </select>
      <label>Event:</label>
      <select id="event-list">
        <option value="">(Select Event)</option>
      </select>
      <label>Function:</label>
      <select id="function-list">
        <option value="">(Select Function)</option>
      </select>
    </div>

    <div id="editor-container" class="script-editor-container"></div>

    <div id="status-bar" class="script-editor-status">
      <span id="status">Ready</span>
      <span id="cursor-pos">Ln 1, Col 1</span>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <script>
    console.log('Script Editor loading, preload:', typeof window.scriptEditor);

    let editor = null;
    let extractedDir = null;
    let tableItems = [];
    let parsedFunctions = [];
    let saveTimeout = null;
    let isTableLocked = false;

    function setTableLocked(locked) {
      isTableLocked = locked;
      if (editor) {
        editor.updateOptions({ readOnly: locked });
      }
      setStatus(locked ? 'Table is locked (read-only)' : 'Ready');
    }

    const ITEM_EVENTS = {
      Primitive: ['Init', 'Timer'],
      Wall: ['Init', 'Hit', 'Timer', 'Slingshot'],
      Surface: ['Init', 'Hit', 'Timer', 'Slingshot'],
      Flipper: ['Init', 'Timer', 'Collide', 'LimitBOS', 'LimitEOS'],
      Bumper: ['Hit', 'Timer', 'UnHit'],
      Trigger: ['Hit', 'Timer', 'Unhit'],
      Light: ['Init', 'Timer'],
      Kicker: ['Hit', 'Timer', 'UnHit'],
      Gate: ['Init', 'Timer', 'Open', 'Close'],
      Spinner: ['Init', 'Timer', 'Spin'],
      Ramp: ['Init', 'Timer'],
      Rubber: ['Init', 'Timer', 'Hit'],
      HitTarget: ['Init', 'Timer', 'Hit', 'Dropped', 'Raised'],
      DropTarget: ['Init', 'Timer', 'Hit', 'Dropped', 'Raised'],
      Plunger: ['Init', 'Timer', 'LimitBOS', 'LimitEOS'],
      TextBox: ['Init', 'Timer'],
      Timer: ['Timer'],
      Decal: ['Init'],
      Flasher: ['Init', 'Timer'],
      LightSequencer: ['Init', 'Timer'],
      Reel: ['Init', 'Timer'],
      Ball: ['Init'],
    };

    const VPINBALL_API = [
      'PlaySound', 'StopSound', 'PlayMusic', 'MusicVolume',
      'GetBalls', 'CreateBall', 'DestroyBall', 'ActiveBall',
      'GameTime', 'SystemTime', 'GetPlayerHWnd',
      'UserDirectory', 'TablesDirectory',
      'NudgeGetCalibration', 'NudgeSetCalibration', 'Nudge',
      'GetCustomParam', 'FireKnocker', 'QuitPlayer',
      'AddObject', 'Version', 'VPBuildVersion', 'VersionMajor', 'VersionMinor', 'VersionRevision',
    ];

    function parseScriptFunctions(code) {
      const functions = [];
      const lines = code.split('\n');
      const regex = /^\s*(sub|function|class|property\s+(get|let|set))\s+(\w+)/i;
      for (let i = 0; i < lines.length; i++) {
        const match = lines[i].match(regex);
        if (match) {
          const type = match[1].toLowerCase();
          const name = match[3] || match[2];
          functions.push({ name, type, line: i + 1 });
        }
      }
      return functions.sort((a, b) => a.name.localeCompare(b.name));
    }

    function updateFunctionList() {
      if (!editor) return;
      const code = editor.getValue();
      parsedFunctions = parseScriptFunctions(code);
      const select = document.getElementById('function-list');
      select.innerHTML = '<option value="">(Select Function)</option>';
      for (const fn of parsedFunctions) {
        const opt = document.createElement('option');
        opt.value = fn.line;
        opt.textContent = fn.name;
        select.appendChild(opt);
      }
    }

    function populateItemList(items) {
      tableItems = items || [];
      const select = document.getElementById('item-list');
      select.innerHTML = '<option value="">(All Items)</option>';
      const sortedItems = [...tableItems].sort((a, b) => a.name.localeCompare(b.name));
      for (const item of sortedItems) {
        const opt = document.createElement('option');
        opt.value = item.name;
        opt.dataset.type = item.type;
        opt.textContent = item.name;
        select.appendChild(opt);
      }
    }

    function updateEventList(itemType) {
      const select = document.getElementById('event-list');
      select.innerHTML = '<option value="">(Select Event)</option>';
      const events = ITEM_EVENTS[itemType] || [];
      for (const event of events) {
        const opt = document.createElement('option');
        opt.value = event;
        opt.textContent = '_' + event;
        select.appendChild(opt);
      }
    }

    function goToOrCreateEventHandler(itemName, eventName) {
      if (!editor || !itemName || !eventName) return;
      const subName = `${itemName}_${eventName}`;
      const code = editor.getValue();
      const regex = new RegExp(`^\\s*sub\\s+${subName}\\s*\\(?`, 'im');
      const lines = code.split('\n');
      for (let i = 0; i < lines.length; i++) {
        if (regex.test(lines[i])) {
          editor.revealLineInCenter(i + 1);
          editor.setPosition({ lineNumber: i + 1, column: 1 });
          editor.focus();
          return;
        }
      }
      if (isTableLocked) return;
      const newSub = `\nSub ${subName}()\n\t\nEnd Sub\n`;
      const model = editor.getModel();
      const lastLine = model.getLineCount();
      model.applyEdits([{ range: new monaco.Range(lastLine, model.getLineMaxColumn(lastLine), lastLine, model.getLineMaxColumn(lastLine)), text: newSub }]);
      editor.revealLineInCenter(lastLine + 2);
      editor.setPosition({ lineNumber: lastLine + 2, column: 2 });
      editor.focus();
    }

    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    async function saveScript() {
      if (!editor) return;

      const content = editor.getValue();
      const result = await window.scriptEditor.saveScript(content);

      if (result.success) {
        setStatus('Saved');
        window.scriptEditor.notifyScriptChanged();
      } else {
        setStatus(`Save failed: ${result.error}`);
      }
    }

    function scheduleAutoSave() {
      if (saveTimeout) clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => {
        saveScript();
      }, 500);
    }

    require(['vs/editor/editor.main'], function () {
      monaco.languages.registerCompletionItemProvider('vb', {
        provideCompletionItems: (model, position) => {
          const suggestions = [];
          for (const item of tableItems) {
            suggestions.push({
              label: item.name,
              kind: monaco.languages.CompletionItemKind.Variable,
              insertText: item.name,
              detail: item.type
            });
          }
          for (const api of VPINBALL_API) {
            suggestions.push({
              label: api,
              kind: monaco.languages.CompletionItemKind.Function,
              insertText: api,
              detail: 'VPinball API'
            });
          }
          for (const fn of parsedFunctions) {
            suggestions.push({
              label: fn.name,
              kind: fn.type === 'sub' ? monaco.languages.CompletionItemKind.Method : monaco.languages.CompletionItemKind.Function,
              insertText: fn.name,
              detail: fn.type
            });
          }
          return { suggestions };
        }
      });

      window.scriptEditor.onInit((data) => {
        console.log('Script Editor received init');
        extractedDir = data.extractedDir;
        const initialContent = data.script || '';
        document.title = data.tableName ? `Script Editor - [${data.tableName}.vpx]` : 'Script Editor';

        if (data.gameitems) {
          populateItemList(data.gameitems);
        }

        if (data.theme) {
          document.documentElement.setAttribute('data-theme', data.theme);
        }

        const container = document.getElementById('editor-container');
        const monacoTheme = data.theme === 'light' ? 'vs' : 'vs-dark';

        editor = monaco.editor.create(container, {
          value: initialContent,
          language: 'vb',
          theme: monacoTheme,
          automaticLayout: true,
          fontSize: 14,
          fontFamily: "'Consolas', 'Monaco', 'Menlo', monospace",
          lineNumbers: 'on',
          minimap: { enabled: true },
          scrollBeyondLastLine: false,
          wordWrap: 'off',
          tabSize: 4,
          insertSpaces: false,
          renderWhitespace: 'selection',
          bracketPairColorization: { enabled: true },
        });

        let updateTimeout = null;
        editor.onDidChangeModelContent(() => {
          scheduleAutoSave();
          if (updateTimeout) clearTimeout(updateTimeout);
          updateTimeout = setTimeout(updateFunctionList, 500);
        });

        editor.onDidChangeCursorPosition((e) => {
          document.getElementById('cursor-pos').textContent = `Ln ${e.position.lineNumber}, Col ${e.position.column}`;
        });

        editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => {
          if (saveTimeout) clearTimeout(saveTimeout);
          saveScript();
        });

        if (data.isLocked) {
          setTableLocked(true);
        } else {
          setStatus('Ready');
        }
        updateFunctionList();
      });

      window.scriptEditor.onThemeChanged((theme) => {
        document.documentElement.setAttribute('data-theme', theme);
        if (editor) {
          monaco.editor.setTheme(theme === 'light' ? 'vs' : 'vs-dark');
        }
      });

      window.scriptEditor.onTableLockChanged((locked) => {
        setTableLocked(locked);
      });

      window.scriptEditor.onScriptUndone((content) => {
        if (editor) {
          const position = editor.getPosition();
          editor.setValue(content);
          if (position) {
            editor.setPosition(position);
          }
          setStatus('Script restored from undo');
        }
      });
    });

    document.getElementById('item-list').addEventListener('change', (e) => {
      const selectedOption = e.target.selectedOptions[0];
      const itemType = selectedOption?.dataset?.type || '';
      updateEventList(itemType);
    });

    document.getElementById('event-list').addEventListener('change', (e) => {
      const itemName = document.getElementById('item-list').value;
      const eventName = e.target.value;
      if (itemName && eventName) {
        goToOrCreateEventHandler(itemName, eventName);
        e.target.value = '';
      }
    });

    document.getElementById('function-list').addEventListener('change', (e) => {
      const line = parseInt(e.target.value, 10);
      if (editor && line) {
        editor.revealLineInCenter(line);
        editor.setPosition({ lineNumber: line, column: 1 });
        editor.focus();
      }
    });

    window.scriptEditor.onCheckCanClose(async () => {
      if (saveTimeout) {
        clearTimeout(saveTimeout);
        await saveScript();
      }
      window.scriptEditor.respondCanClose(true);
    });
  </script>
</body>
</html>
