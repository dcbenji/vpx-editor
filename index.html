<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title></title>
  <script>
    var theme = new URLSearchParams(window.location.search).get('theme');
    if (theme) document.documentElement.setAttribute('data-theme', theme);
  </script>
  <link rel="stylesheet" href="src/shared/window-base.css" />
  <link rel="stylesheet" href="./index.css" />
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <div class="tool-group undo-controls">
        <button id="undo-btn" class="tool-btn icon-btn" data-tooltip="Undo (⌘Z)" disabled>
          <img src="icons/undo.png" alt="Undo">
        </button>
        <button id="redo-btn" class="tool-btn icon-btn" data-tooltip="Redo (⌘⇧Z)" disabled>
          <img src="icons/redo.png" alt="Redo">
        </button>
      </div>
      <div class="tool-group zoom-controls">
        <button id="zoom-in" class="tool-btn" data-tooltip="Zoom In">+</button>
        <span id="zoom-level">100%</span>
        <button id="zoom-out" class="tool-btn" data-tooltip="Zoom Out">-</button>
        <button id="zoom-home" class="tool-btn icon-btn" data-tooltip="Reset View">
          <img src="icons/home.png" alt="Home">
        </button>
      </div>
      <div class="tool-group">
        <button id="toggle-materials" class="tool-btn" data-tooltip="Toggle Materials (M)" style="display:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="4" fill="currentColor"/>
            <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
          </svg>
        </button>
      </div>
      <div class="tool-group">
        <button id="btn-play" class="tool-btn icon-btn" data-tooltip="Play (F5)">
          <img src="icons/play.png" alt="Play">
        </button>
      </div>
      <div id="status-bar">Ready</div>
    </header>

    <main id="workspace">
      <aside id="toolbox-panel">
        <div class="toolbox-section">
          <div class="toolbox-title">TOOLBAR</div>
          <div class="toolbox-grid" id="toolbar-tools">
            <button id="tool-magnify" class="toolbox-btn" data-tooltip="Magnify (Z)">
              <img src="icons/magnify.png" alt="Magnify">
            </button>
            <button id="tool-select" class="toolbox-btn active" data-tooltip="Select (V)">
              <img src="icons/arrow.png" alt="Select">
            </button>
            <button id="tool-pan" class="toolbox-btn" data-tooltip="Pan (H)">
              <img src="icons/pan.png" alt="Pan">
            </button>
            <button id="toggle-backglass" class="toolbox-btn" data-tooltip="Backglass View/POV (Ctrl+Space)">
              <img src="icons/backglass.png" alt="Backglass">
            </button>
            <button id="tool-script" class="toolbox-btn" data-tooltip="Script Editor">
              <img src="icons/script.png" alt="Script">
            </button>
            <button id="tool-3d" class="toolbox-btn" data-tooltip="3D View (3)">
              <img src="icons/3d.png" alt="3D">
            </button>
          </div>
        </div>
        <div class="toolbox-section">
          <div class="toolbox-title">ELEMENTS</div>
          <div class="toolbox-grid" id="elements-toolbar"></div>
        </div>
      </aside>
        <div id="toolbox-resize-handle"></div>

      <div id="canvas-container">
        <canvas id="playfield-canvas"></canvas>
        <div id="item-picker" class="hidden">
          <div id="item-picker-list"></div>
        </div>
        <button id="toggle-wireframe" class="floating-btn floating-btn-left" style="display:none" data-tooltip="Toggle Wireframe (W)"><img src="icons/wireframe.png" width="14" height="14" style="filter:invert(1)"></button>
        <button id="vr-mode-toggle" class="floating-btn" style="display:none" data-tooltip="Toggle VR Visibility">VR</button>
      </div>

      <div id="right-resize-handle"></div>
      <aside id="right-panel">
        <div id="properties-panel">
          <h3 id="properties-title">PROPERTIES</h3>
          <div id="properties-content">
            <p class="placeholder">Select an item to view properties</p>
          </div>
        </div>
        <div id="layers-resize-handle"></div>
        <div id="layers-panel">
          <div class="layers-header">
            <span class="panel-title">LAYERS</span>
          </div>
          <div class="layers-filter-row">
            <input type="text" id="layer-filter-input" class="layers-filter-input" placeholder="Filter...">
          </div>
          <div id="layers-list"></div>
        </div>
      </aside>
    </main>

    <div id="console-resize-handle"></div>
    <div id="console-panel">
      <div id="console-header">
        <span id="console-title">CONSOLE</span>
        <div id="console-controls">
          <button id="console-pin" class="console-btn" data-tooltip="Pin scroll position">
            <img src="icons/pin.png" alt="Pin">
          </button>
          <button id="console-clear" class="console-btn" data-tooltip="Clear">
            <img src="icons/trash.png" alt="Clear">
          </button>
          <button id="console-close" class="console-btn" data-tooltip="Close">
            <img src="icons/close.png" alt="Close">
          </button>
        </div>
      </div>
      <div id="console-output" tabindex="0"></div>
    </div>

    <footer id="footer-status">
      <span id="status-mouse"></span>
      <span id="status-origin"></span>
      <span id="status-blank"></span>
      <span id="status-action"></span>
      <span id="status-element"></span>
      <span id="status-info"></span>
    </footer>
  </div>

  <div id="tooltip"></div>

  <div id="loading-overlay" class="loading-overlay hidden"></div>

  <script type="module" src="src/editor/renderer.js"></script>
</body>
</html>
