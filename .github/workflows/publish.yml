name: Publish Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release from (leave empty for default branch)'
        required: false
        default: ''
      sha:
        description: 'Commit SHA to release (leave empty for latest)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha || inputs.branch || '' }}

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Find build run
        id: find-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.sha }}" ]; then
            RUN_ID=$(gh run list --workflow=build.yml --status=success --commit=${{ inputs.sha }} --limit=1 --json databaseId -q '.[0].databaseId')
          elif [ -n "${{ inputs.branch }}" ]; then
            RUN_ID=$(gh run list --workflow=build.yml --status=success --branch=${{ inputs.branch }} --limit=1 --json databaseId -q '.[0].databaseId')
          else
            RUN_ID=$(gh run list --workflow=build.yml --status=success --limit=1 --json databaseId -q '.[0].databaseId')
          fi
          echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT

      - name: Download artifacts from build workflow
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: vpx-editor-*
          run-id: ${{ steps.find-run.outputs.run_id }}
          github-token: ${{ github.token }}
          skip-decompress: true

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.exe" -o -name "*.deb" -o -name "*.rpm" -o -name "*.flatpak" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: release/*
          generate_release_notes: true
